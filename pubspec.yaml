name: noproblem
description: "나중에 보면 - 감정 타임캡슐"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.4
  go_router: ^14.2.0
  flutter_animate: ^4.5.0
  intl: ^0.20.2
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon.png"

  
